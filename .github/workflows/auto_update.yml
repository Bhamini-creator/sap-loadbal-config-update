name: Auto Update Workflow

on:
  workflow_dispatch:

jobs:
  update-repos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout controlling repo
        uses: actions/checkout@v4

      - name: Set Git config
        run: |
          git config --global user.name "automation-bot"
          git config --global user.email "automation@users.noreply.github.com"

      - name: Install GitHub CLI
        run: sudo apt-get install gh -y

      - name: Auth GitHub CLI
        run: echo "${{ secrets.GH_TOKEN }}" | gh auth login --with-token

      - name: Process Repositories
        run: |
          FEATURE_BRANCH=""feature/sap-loadbal-config-update-$(date +%s)""
          
          while read repo; do
            echo "Processing $repo"

            # Clone repo
            gh repo clone $repo
            repo_name=$(basename $repo)

            cd $repo_name

            # Checkout master and create feature branch
            git checkout master
            git pull origin master
            git checkout -b $FEATURE_BRANCH

            # Copy Python script from main workflow repo
            cp ../update_code.py .

            # Run update
            output=$(python3 update_code.py)

            if [[ "$output" == *"CHANGES_MADE"* ]]; then
              echo "Changes detected, committing..."

              git add .
              git commit -m "Automated regex update"

              git push origin $FEATURE_BRANCH

              echo "Creating PR..."

              gh pr create \
                --base develop \
                --head $FEATURE_BRANCH \
                --title "Automated Regex Code Update" \
                --body "Bulk automated changes using regex script"

            else
              echo "No changes in $repo_name"
            fi

            cd ..
            rm -rf $repo_name

          done < repos.txt