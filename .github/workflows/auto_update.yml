name: Bulk Repo Update & PR Creation

on:
  workflow_dispatch:

jobs:
  update-repos:
    runs-on: ubuntu-latest

    env:
      BASE_BRANCH: "develop"
      SOURCE_BRANCH: "main"

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Generate dynamic branch name
        id: vars
        run: echo "FEATURE_BRANCH=feature/sap-loadbal-config-update-$(date +%s)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests PyGithub

      - name: Run bulk update script
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -e

          while IFS= read -r repo; do
            echo "-----------------------------"
            echo "Processing $repo"

            # ✅ Sanitize repo name
            repo=$(echo "$repo" | tr -d '[:space:]')
            repo=$(echo "$repo" | sed 's/\.git$//')
            repo=$(echo "$repo" | sed 's/[?]//g')

            echo "Sanitized repo: $repo"

            # ✅ Skip empty lines
            if [ -z "$repo" ]; then
              echo "Skipping empty line"
              continue
            fi

            # ✅ Validate repo format
            if [[ ! "$repo" =~ ^[a-zA-Z0-9._/-]+$ ]]; then
              echo "Skipping invalid repo: $repo"
              continue
            fi

            # ✅ Clone repo
            echo "Cloning: https://github.com/${repo}.git"
            git clone https://x-access-token:${GH_TOKEN}@github.com/${repo}.git || {
              echo "❌ Failed to clone $repo"
              continue
            }

            repo_name=$(basename "$repo")
            cd "$repo_name"

            # ✅ Configure git
            git config user.name "Bhamini-creator"
            git config user.email "bhamini.kashyap91@gmail.com"

            # ✅ Checkout source branch (main/master safe fallback)
            git fetch origin
            git checkout ${SOURCE_BRANCH} || git checkout master
            git pull origin $(git branch --show-current)

            # ✅ Create feature branch
            git checkout -b ${FEATURE_BRANCH}

            # ✅ Run Python update
            python ../update_code.py

            # ✅ Commit only if changes exist
            if [[ -n $(git status --porcelain) ]]; then
              git add .
              git commit -m "SAP Load Balancer Config Update"
              git push origin ${FEATURE_BRANCH}

              # ✅ Create PR
              curl -s -X POST https://api.github.com/repos/${repo}/pulls \
                -H "Authorization: token ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -d "{
                  \"title\": \"SAP Load Balancer Config Updates\",
                  \"body\": \"Automated update via GitHub Actions.\",
                  \"head\": \"${FEATURE_BRANCH}\",
                  \"base\": \"${BASE_BRANCH}\"
                }"

              echo "✅ PR created for $repo"
            else
              echo "⚠️ No changes detected for $repo"
            fi

            cd ..
            rm -rf "$repo_name"

          done < repos.txt
