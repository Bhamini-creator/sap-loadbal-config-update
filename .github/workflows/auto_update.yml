name: Bulk Repo Update & PR Creation

on:
  workflow_dispatch:

jobs:
  update-repos:
    runs-on: ubuntu-latest

    env:
      FEATURE_BRANCH: "feature/sap-loadbal-config-update-$(date +%s)"
      BASE_BRANCH: "develop"
      SOURCE_BRANCH: "master"

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (if needed)
        run: |
          pip install requests PyGithub

      - name: Run bulk update script
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -e

          while IFS= read -r repo; do
            echo "Processing $repo"

            # Clone repo
            git clone https://x-access-token:${GH_TOKEN}@github.com/${repo}.git
            repo_name=$(basename "$repo")
            cd $repo_name

            # Configure git
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"

            # Checkout source branch
            git checkout ${SOURCE_BRANCH}
            git pull origin ${SOURCE_BRANCH}

            # Create feature branch
            git checkout -b ${FEATURE_BRANCH}

            # Run Python regex update
            python ../update_script.py

            # Check if changes exist
            if [[ -n $(git status --porcelain) ]]; then
              git add .
              git commit -m "Automated regex update"

              git push origin ${FEATURE_BRANCH}

              # Create PR using API
              curl -s -X POST https://api.github.com/repos/${repo}/pulls \
                -H "Authorization: token ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -d "{
                  \"title\": \"Automated Regex Updates\",
                  \"body\": \"This PR contains automated updates via regex script.\",
                  \"head\": \"${FEATURE_BRANCH}\",
                  \"base\": \"${BASE_BRANCH}\"
                }"

              echo "PR created for $repo"
            else
              echo "No changes detected for $repo"
            fi

            cd ..
            rm -rf $repo_name

          done < repos.txt
